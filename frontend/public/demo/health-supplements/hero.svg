    <text x="447" y="590" font-family="sans-serif" font-size="18" font-weight="800" fill="#059669">Collagen Peptide Thủy Phân 10.000mg</text>
    <text x="447" y="665" font-family="sans-serif" font-size="13" fill="#64748b">Giúp da săn chắc, làm mờ nếp nhăn hiệu quả</text>
    <text x="447" y="730" font-family="sans-serif" font-size="20" font-weight="900" fill="#0f172a">890.000đ</text>
    <rect x="647" y="705" width="105" height="34" rx="17" fill="url(#gradBtn_health-supplements)" />
    <text x="700" y="727" font-family="sans-serif" font-size="12" font-weight="800" fill="#ffffff" text-anchor="middle">Chọn Mua</text>
  </g>

  <!-- Card 3 -->
  <g filter="url(#shadow_health-supplements)">
    <rect x="805" y="530" width="345" height="230" rx="16" fill="#ffffff" />
    <rect x="805" y="530" width="345" height="110" rx="16" fill="#059669" opacity="0.12" />
    <text x="825" y="590" font-family="sans-serif" font-size="18" font-weight="800" fill="#059669">Vitamin C 1000mg Tăng Đề Kháng</text>
    <text x="825" y="665" font-family="sans-serif" font-size="13" fill="#64748b">Bổ sung năng lượng & bảo vệ tế bào cơ thể</text>
    <text x="825" y="730" font-family="sans-serif" font-size="20" font-weight="900" fill="#0f172a">320.000đ</text>
    <rect x="1025" y="705" width="105" height="34" rx="17" fill="url(#gradBtn_health-supplements)" />
    <text x="1077" y="727" font-family="sans-serif" font-size="12" font-weight="800" fill="#ffffff" text-anchor="middle">Chọn Mua</text>
  </g>
