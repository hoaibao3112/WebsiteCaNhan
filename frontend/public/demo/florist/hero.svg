<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="gradHero_florist" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="gradBtn_florist" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e11d48" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
    <filter id="shadow_florist" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="1200" height="800" fill="#f8fafc" />

  <!-- Browser Window Top Bar -->
  <rect width="1200" height="42" fill="#e2e8f0" />
  <circle cx="25" cy="21" r="6" fill="#ef4444" />
  <circle cx="43" cy="21" r="6" fill="#f59e0b" />
  <circle cx="61" cy="21" r="6" fill="#10b981" />

  <!-- URL Address Bar -->
  <rect x="180" y="8" width="840" height="26" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text x="600" y="25" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">🔒 https://kabo.agency/demo/hoa-tuoi</text>

  <!-- Website Header Navigation Bar -->
  <rect y="42" width="1200" height="70" fill="#ffffff" stroke="#f1f5f9" stroke-width="1" />
  <!-- Logo -->
  <rect x="50" y="60" width="36" height="34" rx="8" fill="url(#gradBtn_florist)" />
  <text x="96" y="83" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="900" fill="#0f172a">FLORIST <tspan fill="#e11d48">STUDIO</tspan></text>

  <!-- Menu Links -->
  <text x="680" y="83" font-family="sans-serif" font-size="14" font-weight="700" fill="#e11d48">Trang Chủ</text>
  <text x="770" y="83" font-family="sans-serif" font-size="14" font-weight="500" fill="#64748b">Sản Phẩm</text>
  <text x="860" y="83" font-family="sans-serif" font-size="14" font-weight="500" fill="#64748b">Dịch Vụ</text>
  <text x="940" y="83" font-family="sans-serif" font-size="14" font-weight="500" fill="#64748b">Liên Hệ</text>
  <rect x="1020" y="58" width="130" height="38" rx="20" fill="url(#gradBtn_florist)" />
  <text x="1085" y="82" font-family="sans-serif" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle">Đặt Hàng Ngay</text>

  <!-- Hero Section -->
  <rect y="112" width="1200" height="340" fill="url(#gradHero_florist)" />
  
  <!-- Hero Content Left -->
  <rect x="50" y="142" width="170" height="26" rx="13" fill="#e11d48" opacity="0.25" />
  <text x="135" y="159" font-family="sans-serif" font-size="11" font-weight="800" fill="#f43f5e" text-anchor="middle">✨ FLORIST BOUTIQUE</text>

  <text x="50" y="215" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="32" font-weight="900" fill="#ffffff">Cửa Hàng Hoa Tươi & Thiệp Cưới</text>
  <text x="50" y="250" font-family="sans-serif" font-size="16" fill="#94a3b8">Bó hoa thiết kế cao cấp, hoa chúc mừng & trang trí tiệc</text>

  <!-- Hero CTA Buttons -->
  <rect x="50" y="285" width="180" height="48" rx="24" fill="url(#gradBtn_florist)" filter="url(#shadow_florist)" />
  <text x="140" y="315" font-family="sans-serif" font-size="15" font-weight="800" fill="#ffffff" text-anchor="middle">Khám Phá Ngay →</text>

  <rect x="245" y="285" width="160" height="48" rx="24" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6" />
  <text x="325" y="315" font-family="sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Xem Báo Giá</text>

  <!-- Hero Right Card Showcase Mockup -->
  <g filter="url(#shadow_florist)">
    <rect x="700" y="150" width="450" height="260" rx="16" fill="#ffffff" opacity="0.95" />
    <rect x="720" y="170" width="410" height="140" rx="12" fill="#e11d48" opacity="0.1" />
    <circle cx="925" cy="240" r="35" fill="#e11d48" opacity="0.8" />
    <polygon points="920,225 940,240 920,255" fill="#ffffff" />
    <text x="730" y="340" font-family="sans-serif" font-size="18" font-weight="900" fill="#0f172a">Giao diện Website Chuyên Nghiệp</text>
    <text x="730" y="365" font-family="sans-serif" font-size="13" fill="#64748b">Chuẩn SEO, tối ưu tốc độ & tương thích mọi thiết bị</text>
    <rect x="730" y="380" width="120" height="18" rx="9" fill="#e11d48" />
    <text x="790" y="393" font-family="sans-serif" font-size="10" font-weight="800" fill="#ffffff" text-anchor="middle">DEMO UI LIVE</text>
  </g>

  <!-- Cards Showcase Title -->
  <text x="600" y="490" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="900" fill="#0f172a" text-anchor="middle">DANH MỤC NỔI BẬT & BẢNG GIÁ DỊCH VỤ</text>
  <rect x="560" y="505" width="80" height="4" rx="2" fill="#e11d48" />

  <!-- 3 Cards Layout Section -->
  <!-- Card 1 -->
  <g filter="url(#shadow_florist)">
    <rect x="50" y="530" width="345" height="230" rx="16" fill="#ffffff" />
    <rect x="50" y="530" width="345" height="110" rx="16" fill="#e11d48" opacity="0.12" />
    <text x="70" y="590" font-family="sans-serif" font-size="18" font-weight="800" fill="#e11d48">Bó Hoa Hồng Ecuador</text>
    <text x="70" y="665" font-family="sans-serif" font-size="13" fill="#64748b">99 bông hồng đỏ thắm tượng trưng tình yêu vĩnh cửu</text>
    <text x="70" y="730" font-family="sans-serif" font-size="20" font-weight="900" fill="#0f172a">850.000đ</text>
    <rect x="270" y="705" width="105" height="34" rx="17" fill="url(#gradBtn_florist)" />
    <text x="322" y="727" font-family="sans-serif" font-size="12" font-weight="800" fill="#ffffff" text-anchor="middle">Chọn Mua</text>
  </g>

  <!-- Card 2 -->
  <g filter="url(#shadow_florist)">
    <rect x="427" y="530" width="345" height="230" rx="16" fill="#ffffff" stroke="#e11d48" stroke-width="2" />
    <rect x="427" y="530" width="345" height="110" rx="14" fill="#e11d48" opacity="0.2" />
    <rect x="670" y="545" width="85" height="22" rx="11" fill="#e11d48" />
    <text x="712" y="560" font-family="sans-serif" font-size="10" font-weight="800" fill="#ffffff" text-anchor="middle">BÁN CHẠY</text>
    <text x="447" y="590" font-family="sans-serif" font-size="18" font-weight="800" fill="#e11d48">Giỏ Hoa Tulip Hà Lan</text>
    <text x="447" y="665" font-family="sans-serif" font-size="13" fill="#64748b">Nhập khẩu 100% tươi mới phối màu pastel tinh tế</text>
    <text x="447" y="730" font-family="sans-serif" font-size="20" font-weight="900" fill="#0f172a">950.000đ</text>
    <rect x="647" y="705" width="105" height="34" rx="17" fill="url(#gradBtn_florist)" />
    <text x="700" y="727" font-family="sans-serif" font-size="12" font-weight="800" fill="#ffffff" text-anchor="middle">Chọn Mua</text>
  </g>

  <!-- Card 3 -->
  <g filter="url(#shadow_florist)">
    <rect x="805" y="530" width="345" height="230" rx="16" fill="#ffffff" />
    <rect x="805" y="530" width="345" height="110" rx="16" fill="#e11d48" opacity="0.12" />
    <text x="825" y="590" font-family="sans-serif" font-size="18" font-weight="800" fill="#e11d48">Kệ Hoa Khai Trương</text>
    <text x="825" y="665" font-family="sans-serif" font-size="13" fill="#64748b">Thiết kế sang trọng mang lại may mắn tài lộc</text>
    <text x="825" y="730" font-family="sans-serif" font-size="20" font-weight="900" fill="#0f172a">1.500.000đ</text>
    <rect x="1025" y="705" width="105" height="34" rx="17" fill="url(#gradBtn_florist)" />
    <text x="1077" y="727" font-family="sans-serif" font-size="12" font-weight="800" fill="#ffffff" text-anchor="middle">Chọn Mua</text>
  </g>
</svg>